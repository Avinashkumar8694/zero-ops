<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Inspector — zero-ops</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs" type="module"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: rgba(255, 255, 255, 0.06);
            --text: #e4e4e7;
            --text-muted: #71717a;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.15);
            --green: #34d399;
            --green-glow: rgba(52, 211, 153, 0.15);
            --inspector-bg: rgba(15, 15, 25, 0.92);
            --inspector-border: rgba(129, 140, 248, 0.25);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .header-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-info {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* PDF Container */
        .pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
            gap: 24px;
        }

        .page-wrapper {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .page-wrapper canvas {
            display: block;
        }

        .page-label {
            position: absolute;
            top: -28px;
            left: 0;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Text layer overlay */
        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .text-layer .text-item {
            position: absolute;
            color: transparent;
            cursor: crosshair;
            white-space: pre;
            transform-origin: left bottom;
            transition: background 0.15s ease;
            border-radius: 2px;
        }

        .text-layer .text-item:hover {
            background: rgba(129, 140, 248, 0.18);
            outline: 1.5px solid rgba(129, 140, 248, 0.5);
        }

        /* Image/Graphics overlay items */
        .text-layer .img-item {
            position: absolute;
            cursor: crosshair;
            transition: background 0.15s ease, outline 0.15s ease;
            border-radius: 1px;
        }

        .text-layer .img-item:hover {
            background: rgba(52, 211, 153, 0.15);
            outline: 2px solid rgba(52, 211, 153, 0.6);
        }

        /* Inspector Panel */
        .inspector {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(6px);
            max-width: 380px;
            min-width: 280px;
        }

        .inspector.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .inspector-inner {
            background: var(--inspector-bg);
            backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--inspector-border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
        }

        .inspector-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .inspector-icon {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: 700;
        }

        .inspector-icon.img-icon {
            background: var(--green);
        }

        .inspector-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .inspector-title.img-title {
            color: var(--green);
        }

        .inspector-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .inspector-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
            line-height: 1.5;
        }

        .inspector-key {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            min-width: 90px;
            flex-shrink: 0;
        }

        .inspector-val {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            word-break: break-all;
        }

        .inspector-text-preview {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text);
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .inspector-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 6px 0;
        }

        .click-hint {
            margin-top: 8px;
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .zoom-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .zoom-level {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            min-width: 42px;
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 12px var(--green-glow);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">
            PDF Inspector <span>— zero-ops</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="header-info" id="fileInfo">Loading...</div>
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomOut">−</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" id="zoomIn">+</button>
            </div>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Parsing PDF...</div>
    </div>

    <div class="pdf-container" id="pdfContainer" style="display:none;"></div>

    <!-- Inspector Panel -->
    <div class="inspector" id="inspector">
        <div class="inspector-inner">
            <div class="inspector-header">
                <div class="inspector-icon" id="inspectorIcon">Aa</div>
                <div class="inspector-title" id="inspectorTitle">Element Inspector</div>
            </div>
            <div class="inspector-content" id="inspectorContent"></div>
            <div class="click-hint">Click to copy properties</div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Properties copied to clipboard</div>

    <script type="module">
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

        const inspector = document.getElementById('inspector');
        const inspectorContent = document.getElementById('inspectorContent');
        const inspectorIcon = document.getElementById('inspectorIcon');
        const inspectorTitle = document.getElementById('inspectorTitle');
        const pdfContainer = document.getElementById('pdfContainer');
        const loadingEl = document.getElementById('loading');
        const fileInfoEl = document.getElementById('fileInfo');
        const zoomLevelEl = document.getElementById('zoomLevel');
        const toastEl = document.getElementById('toast');

        let currentScale = 1.5;
        let pdfDoc = null;
        let lastInspectedData = null; // store last hovered element's data for click-to-copy

        // Fetch the PDF
        async function loadPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument('/pdf');
                pdfDoc = await loadingTask.promise;
                fileInfoEl.textContent = `${pdfDoc.numPages} page${pdfDoc.numPages > 1 ? 's' : ''}`;
                loadingEl.style.display = 'none';
                pdfContainer.style.display = 'flex';
                await renderAllPages();
            } catch (err) {
                loadingEl.innerHTML = `<div style="color:#ef4444;font-size:14px;">Failed to load PDF: ${err.message}</div>`;
            }
        }

        async function renderAllPages() {
            pdfContainer.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                await renderPage(i);
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: currentScale });

            // Wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';

            // Label
            const label = document.createElement('div');
            label.className = 'page-label';
            label.textContent = `Page ${pageNum}`;
            wrapper.appendChild(label);

            // Canvas
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            wrapper.appendChild(canvas);

            // Render canvas
            await page.render({ canvasContext: ctx, viewport }).promise;

            // Text layer
            const textLayer = document.createElement('div');
            textLayer.className = 'text-layer';
            wrapper.appendChild(textLayer);

            // Get text content
            const textContent = await page.getTextContent();

            // ─── Process text items ───
            for (const item of textContent.items) {
                if (!item.str || item.str.trim() === '') continue;

                const tx = item.transform;
                const fontHeight = Math.abs(tx[3]) * currentScale;
                const x = tx[4] * currentScale;
                const y = viewport.height - (tx[5] * currentScale) - fontHeight;
                const w = item.width * currentScale;
                const h = item.height * currentScale;

                const span = document.createElement('span');
                span.className = 'text-item';
                span.textContent = item.str;
                span.style.left = x + 'px';
                span.style.top = y + 'px';
                span.style.fontSize = fontHeight + 'px';
                span.style.width = w + 'px';
                span.style.height = (h || fontHeight) + 'px';

                span.dataset.type = 'text';
                span.dataset.text = item.str;
                span.dataset.fontName = item.fontName || 'Unknown';
                span.dataset.fontSize = (Math.abs(tx[3])).toFixed(2);
                span.dataset.posX = tx[4].toFixed(2);
                span.dataset.posY = tx[5].toFixed(2);
                span.dataset.width = (item.width || 0).toFixed(2);
                span.dataset.height = (item.height || 0).toFixed(2);
                span.dataset.scaleX = tx[0].toFixed(4);
                span.dataset.scaleY = tx[3].toFixed(4);
                span.dataset.skewX = tx[2].toFixed(4);
                span.dataset.skewY = tx[1].toFixed(4);
                span.dataset.direction = item.dir || 'ltr';
                span.dataset.page = pageNum;

                span.addEventListener('mouseenter', showInspector);
                span.addEventListener('mouseleave', hideInspector);
                span.addEventListener('mousemove', moveInspector);
                span.addEventListener('click', copyProperties);

                textLayer.appendChild(span);
            }

            // ─── Process images from operator list ───
            const opList = await page.getOperatorList();
            const OPS = pdfjsLib.OPS;

            // Track transform state to compute image positions
            const ctmStack = [];
            // Start with the viewport transform
            let ctm = viewport.transform.slice();

            for (let i = 0; i < opList.fnArray.length; i++) {
                const fn = opList.fnArray[i];
                const args = opList.argsArray[i];

                if (fn === OPS.save) {
                    ctmStack.push(ctm.slice());
                } else if (fn === OPS.restore) {
                    ctm = ctmStack.pop() || viewport.transform.slice();
                } else if (fn === OPS.transform) {
                    // args = [a, b, c, d, e, f]
                    ctm = multiplyMatrices(ctm, args);
                } else if (fn === OPS.paintImageXObject || fn === OPS.paintJpegXObject) {
                    const imgName = args[0];
                    let imgWidth = args[1] || 0;
                    let imgHeight = args[2] || 0;

                    // Try to get actual image object for pixel dimensions
                    let pixelWidth = imgWidth;
                    let pixelHeight = imgHeight;
                    try {
                        const imgData = page.objs.get(imgName);
                        if (imgData) {
                            pixelWidth = imgData.width || imgWidth;
                            pixelHeight = imgData.height || imgHeight;
                        }
                    } catch (e) { /* ignore */ }

                    // Images in PDF are drawn in a 1x1 unit square, scaled by the CTM
                    // The CTM maps (0,0)→(1,1) to the actual position
                    const p0 = transformPoint(ctm, 0, 0);
                    const p1 = transformPoint(ctm, 1, 0);
                    const p2 = transformPoint(ctm, 0, 1);
                    const p3 = transformPoint(ctm, 1, 1);

                    const minX = Math.min(p0[0], p1[0], p2[0], p3[0]);
                    const minY = Math.min(p0[1], p1[1], p2[1], p3[1]);
                    const maxX = Math.max(p0[0], p1[0], p2[0], p3[0]);
                    const maxY = Math.max(p0[1], p1[1], p2[1], p3[1]);

                    const drawW = maxX - minX;
                    const drawH = maxY - minY;

                    // Skip tiny images (likely artifacts or patterns)
                    if (drawW < 5 || drawH < 5) continue;

                    // PDF coord to screen: ctm already includes viewport transform
                    const div = document.createElement('div');
                    div.className = 'img-item';
                    div.style.left = minX + 'px';
                    div.style.top = minY + 'px';
                    div.style.width = drawW + 'px';
                    div.style.height = drawH + 'px';

                    // Compute rendered dimensions in pt (without scale)
                    const renderedWPt = (drawW / currentScale).toFixed(2);
                    const renderedHPt = (drawH / currentScale).toFixed(2);

                    div.dataset.type = 'image';
                    div.dataset.imgName = imgName;
                    div.dataset.pixelWidth = pixelWidth;
                    div.dataset.pixelHeight = pixelHeight;
                    div.dataset.renderedWidth = renderedWPt;
                    div.dataset.renderedHeight = renderedHPt;
                    div.dataset.posX = (minX / currentScale).toFixed(2);
                    div.dataset.posY = (minY / currentScale).toFixed(2);
                    div.dataset.dpiX = pixelWidth > 0 ? ((pixelWidth / (parseFloat(renderedWPt) / 72))).toFixed(0) : 'N/A';
                    div.dataset.dpiY = pixelHeight > 0 ? ((pixelHeight / (parseFloat(renderedHPt) / 72))).toFixed(0) : 'N/A';
                    div.dataset.page = pageNum;
                    div.dataset.aspectRatio = pixelWidth > 0 && pixelHeight > 0
                        ? (pixelWidth / pixelHeight).toFixed(3)
                        : 'N/A';

                    div.addEventListener('mouseenter', showInspector);
                    div.addEventListener('mouseleave', hideInspector);
                    div.addEventListener('mousemove', moveInspector);
                    div.addEventListener('click', copyProperties);

                    textLayer.appendChild(div);
                }
            }

            pdfContainer.appendChild(wrapper);
        }

        // ─── Matrix math ───
        function multiplyMatrices(m1, m2) {
            // 2D affine: [a,b,c,d,e,f]
            return [
                m1[0] * m2[0] + m1[2] * m2[1],
                m1[1] * m2[0] + m1[3] * m2[1],
                m1[0] * m2[2] + m1[2] * m2[3],
                m1[1] * m2[2] + m1[3] * m2[3],
                m1[0] * m2[4] + m1[2] * m2[5] + m1[4],
                m1[1] * m2[4] + m1[3] * m2[5] + m1[5]
            ];
        }

        function transformPoint(m, x, y) {
            return [
                m[0] * x + m[2] * y + m[4],
                m[1] * x + m[3] * y + m[5]
            ];
        }

        // ─── Font style resolution ───
        function resolveFontStyle(fontName) {
            const name = (fontName || '').toLowerCase();
            let weight = '400 (Regular)';
            let style = 'normal';
            let family = fontName;

            if (name.includes('bold') && name.includes('italic')) { weight = '700 (Bold)'; style = 'italic'; }
            else if (name.includes('bold')) weight = '700 (Bold)';
            else if (name.includes('semibold')) weight = '600 (SemiBold)';
            else if (name.includes('light')) weight = '300 (Light)';
            else if (name.includes('thin')) weight = '100 (Thin)';
            else if (name.includes('medium')) weight = '500 (Medium)';

            if (name.includes('italic') || name.includes('oblique')) style = 'italic';

            family = fontName.replace(/^[A-Z]{6}\+/, '');
            family = family.replace(/[-,](Bold|Italic|Regular|Light|Medium|SemiBold|Thin|Oblique|Roman)/gi, '');

            return { family, weight, style };
        }

        // ─── Inspector Logic ───
        function showInspector(e) {
            const el = e.target;
            const d = el.dataset;

            let html = '';
            let propsObj = {};

            if (d.type === 'text') {
                const font = resolveFontStyle(d.fontName);

                inspectorIcon.textContent = 'Aa';
                inspectorIcon.className = 'inspector-icon';
                inspectorTitle.textContent = 'Text Element';
                inspectorTitle.className = 'inspector-title';

                html += `<div class="inspector-text-preview">"${escapeHtml(d.text)}"</div>`;
                html += `<div class="inspector-divider"></div>`;
                html += row('font-family', font.family);
                html += row('font-size', d.fontSize + ' pt');
                html += row('font-weight', font.weight);
                html += row('font-style', font.style);
                html += `<div class="inspector-divider"></div>`;
                html += row('x', d.posX + ' pt');
                html += row('y', d.posY + ' pt');
                html += row('width', d.width + ' pt');
                html += row('height', d.height + ' pt');
                html += `<div class="inspector-divider"></div>`;
                html += row('scaleX', d.scaleX);
                html += row('scaleY', d.scaleY);
                html += row('skewX', d.skewX);
                html += row('skewY', d.skewY);
                html += `<div class="inspector-divider"></div>`;
                html += row('direction', d.direction);
                html += row('page', d.page);
                html += row('raw-font', d.fontName);

                propsObj = {
                    type: 'text',
                    text: d.text,
                    fontFamily: font.family,
                    fontSize: d.fontSize + ' pt',
                    fontWeight: font.weight,
                    fontStyle: font.style,
                    x: d.posX + ' pt',
                    y: d.posY + ' pt',
                    width: d.width + ' pt',
                    height: d.height + ' pt',
                    scaleX: d.scaleX,
                    scaleY: d.scaleY,
                    skewX: d.skewX,
                    skewY: d.skewY,
                    direction: d.direction,
                    page: d.page,
                    rawFont: d.fontName
                };

            } else if (d.type === 'image') {
                inspectorIcon.textContent = '🖼';
                inspectorIcon.className = 'inspector-icon img-icon';
                inspectorTitle.textContent = 'Image Element';
                inspectorTitle.className = 'inspector-title img-title';

                html += row('image-name', d.imgName);
                html += `<div class="inspector-divider"></div>`;
                html += row('pixel-width', d.pixelWidth + ' px');
                html += row('pixel-height', d.pixelHeight + ' px');
                html += row('aspect-ratio', d.aspectRatio);
                html += `<div class="inspector-divider"></div>`;
                html += row('rendered-w', d.renderedWidth + ' pt');
                html += row('rendered-h', d.renderedHeight + ' pt');
                html += `<div class="inspector-divider"></div>`;
                html += row('x', d.posX + ' pt');
                html += row('y', d.posY + ' pt');
                html += row('dpi-x', d.dpiX);
                html += row('dpi-y', d.dpiY);
                html += `<div class="inspector-divider"></div>`;
                html += row('page', d.page);

                propsObj = {
                    type: 'image',
                    imageName: d.imgName,
                    pixelWidth: d.pixelWidth + ' px',
                    pixelHeight: d.pixelHeight + ' px',
                    aspectRatio: d.aspectRatio,
                    renderedWidth: d.renderedWidth + ' pt',
                    renderedHeight: d.renderedHeight + ' pt',
                    x: d.posX + ' pt',
                    y: d.posY + ' pt',
                    dpiX: d.dpiX,
                    dpiY: d.dpiY,
                    page: d.page
                };
            }

            lastInspectedData = propsObj;
            inspectorContent.innerHTML = html;
            inspector.classList.add('visible');
        }

        function hideInspector() {
            inspector.classList.remove('visible');
            lastInspectedData = null;
        }

        function moveInspector(e) {
            const pad = 16;
            const rect = inspector.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const pw = rect.width || 320;
            const ph = rect.height || 300;

            let x = e.clientX + pad;
            let y = e.clientY + pad;

            if (x + pw > vw - pad) x = e.clientX - pw - pad;
            if (x < pad) x = pad;
            if (y + ph > vh - pad) y = e.clientY - ph - pad;
            if (y < pad) y = pad;

            inspector.style.left = x + 'px';
            inspector.style.top = y + 'px';
        }

        // ─── Click to Copy ───
        function copyProperties(e) {
            e.preventDefault();
            if (!lastInspectedData) return;

            const text = Object.entries(lastInspectedData)
                .map(([k, v]) => `${k}: ${v}`)
                .join('\n');

            navigator.clipboard.writeText(text).then(() => {
                showToast();
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast();
            });
        }

        function showToast() {
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        function row(key, val) {
            return `<div class="inspector-row"><span class="inspector-key">${key}</span><span class="inspector-val">${val}</span></div>`;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ─── Zoom ───
        document.getElementById('zoomIn').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.25, 4);
            zoomLevelEl.textContent = Math.round(currentScale / 1.5 * 100) + '%';
            renderAllPages();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.25, 0.5);
            zoomLevelEl.textContent = Math.round(currentScale / 1.5 * 100) + '%';
            renderAllPages();
        });

        // ─── Init ───
        loadPDF();
    </script>
</body>

</html>
