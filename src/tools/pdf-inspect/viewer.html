<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Inspector — zero-ops</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: rgba(255, 255, 255, 0.06);
            --text: #e4e4e7;
            --text-muted: #71717a;
            --accent: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.15);
            --green: #34d399;
            --green-glow: rgba(52, 211, 153, 0.15);
            --inspector-bg: rgba(15, 15, 25, 0.92);
            --inspector-border: rgba(129, 140, 248, 0.25);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .header-title span {
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-info {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
            gap: 24px;
        }

        .page-wrapper {
            position: relative;
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .page-wrapper canvas {
            display: block;
        }

        .page-label {
            position: absolute;
            top: -28px;
            left: 0;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .text-layer .text-item {
            position: absolute;
            color: transparent;
            cursor: crosshair;
            white-space: pre;
            transform-origin: left bottom;
            transition: background 0.15s ease;
            border-radius: 2px;
        }

        .text-layer .text-item:hover {
            background: rgba(129, 140, 248, 0.18);
            outline: 1.5px solid rgba(129, 140, 248, 0.5);
        }

        .text-layer .img-item {
            position: absolute;
            cursor: crosshair;
            transition: background 0.15s ease;
            border-radius: 1px;
        }

        .text-layer .img-item:hover {
            background: rgba(52, 211, 153, 0.15);
            outline: 2px solid rgba(52, 211, 153, 0.6);
        }

        .text-layer .box-item {
            position: absolute;
            pointer-events: auto;
            transition: outline 0.15s ease;
        }

        .text-layer .box-item:hover {
            outline: 2px solid rgba(245, 158, 11, 0.6);
            background: rgba(245, 158, 11, 0.1) !important;
        }

        /* Inspector */
        .inspector {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateY(6px);
            max-width: 400px;
            min-width: 300px;
        }

        .inspector.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .inspector-inner {
            background: var(--inspector-bg);
            backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--inspector-border);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
        }

        .inspector-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .inspector-icon {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: 700;
        }

        .inspector-icon.img-icon {
            background: var(--green);
        }

        .inspector-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .inspector-title.img-title {
            color: var(--green);
        }

        .inspector-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .inspector-section-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 6px;
            margin-bottom: 2px;
            opacity: 0.7;
        }

        .inspector-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
            line-height: 1.4;
        }

        .inspector-key {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            min-width: 100px;
            flex-shrink: 0;
        }

        .inspector-val {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            word-break: break-all;
        }

        .inspector-text-preview {
            margin-top: 6px;
            padding: 6px 8px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text);
            max-height: 48px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .inspector-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 4px 0;
        }

        .color-preview {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            vertical-align: middle;
            margin-right: 6px;
        }

        .click-hint {
            margin-top: 6px;
            font-size: 9px;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }

        .css-snippet {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(129, 140, 248, 0.06);
            border: 1px solid rgba(129, 140, 248, 0.15);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9.5px;
            color: var(--text);
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Zoom */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .zoom-btn:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .zoom-level {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            min-width: 42px;
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 12px var(--green-glow);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Download Button */
        .download-btn {
            height: 28px;
            padding: 0 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .download-btn:hover {
            border-color: var(--green);
            background: var(--green-glow);
            color: var(--green);
        }

        .download-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Crop Tool */
        .crop-btn {
            height: 28px;
            padding: 0 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .crop-btn:hover {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .crop-btn.active {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
        }

        body.crop-mode .page-wrapper {
            cursor: crosshair;
        }

        body.crop-mode .text-item,
        body.crop-mode .img-item,
        body.crop-mode .box-item {
            pointer-events: none;
        }

        .crop-selection {
            position: absolute;
            border: 2px dashed #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">PDF Inspector <span>— zero-ops</span></div>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="header-info" id="fileInfo">Loading...</div>
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomOut">−</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" id="zoomIn">+</button>
            </div>
            <button class="crop-btn" id="cropBtn" title="Select a region to capture as an image">✂ Crop</button>
            <button class="download-btn" id="downloadBtn" disabled onclick="downloadHBS()">
                ⬇ Download .hbs
            </button>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Parsing PDF...</div>
    </div>

    <div class="pdf-container" id="pdfContainer" style="display:none;"></div>

    <div class="inspector" id="inspector">
        <div class="inspector-inner">
            <div class="inspector-header">
                <div class="inspector-icon" id="inspectorIcon">Aa</div>
                <div class="inspector-title" id="inspectorTitle">Text Element</div>
            </div>
            <div class="inspector-content" id="inspectorContent"></div>
            <div class="click-hint">Click to copy CSS + properties</div>
        </div>
    </div>

    <div class="toast" id="toast">✓ Copied to clipboard</div>

    <script type="module">
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

        const inspector = document.getElementById('inspector');
        const inspectorContent = document.getElementById('inspectorContent');
        const inspectorIcon = document.getElementById('inspectorIcon');
        const inspectorTitle = document.getElementById('inspectorTitle');
        const pdfContainer = document.getElementById('pdfContainer');
        const loadingEl = document.getElementById('loading');
        const fileInfoEl = document.getElementById('fileInfo');
        const zoomLevelEl = document.getElementById('zoomLevel');
        const toastEl = document.getElementById('toast');

        let currentScale = 1.5;
        let pdfDoc = null;
        let lastCopyData = null;
        const pageRefs = {};  // Store page refs for direct image extraction
        const inlineImageCache = {};  // Store pre-extracted base64 for inline images

        const PT_TO_PX = 96 / 72; // only used for rendering scale, NOT for display values

        async function loadPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument('/pdf');
                pdfDoc = await loadingTask.promise;
                fileInfoEl.textContent = `${pdfDoc.numPages} page${pdfDoc.numPages > 1 ? 's' : ''}`;
                loadingEl.style.display = 'none';
                pdfContainer.style.display = 'flex';
                await renderAllPages();
                // Enable download button
                document.getElementById('downloadBtn').disabled = false;
            } catch (err) {
                loadingEl.innerHTML = `<div style="color:#ef4444;font-size:14px;">Failed to load PDF: ${err.message}</div>`;
            }
        }

        async function renderAllPages() {
            pdfContainer.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                await renderPage(i);
            }
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            pageRefs[pageNum] = page; // Cache for image extraction
            const viewport = page.getViewport({ scale: currentScale });

            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.dataset.page = pageNum;
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';

            const label = document.createElement('div');
            label.className = 'page-label';
            label.textContent = `Page ${pageNum}`;
            wrapper.appendChild(label);

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            wrapper.appendChild(canvas);

            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

            const textLayer = document.createElement('div');
            textLayer.className = 'text-layer';
            wrapper.appendChild(textLayer);

            // ═══ Get text content WITH styles and colors ═══
            const textContent = await page.getTextContent({ includeColor: true });
            const styles = textContent.styles;

            // ═══ Resolve REAL font names from PDF.js font objects (async callback API) ═══
            const fontInfoCache = {};
            const fontPromises = [];
            for (const [loadedName, style] of Object.entries(styles)) {
                fontPromises.push(new Promise(resolve => {
                    try {
                        // Use callback API — more reliable than sync .get()
                        page.commonObjs.get(loadedName, (fontObj) => {
                            let psName = style.fontFamily || loadedName;
                            let isBold = false;
                            let isItalic = false;
                            if (fontObj) {
                                if (fontObj.name) psName = fontObj.name;
                                if (fontObj.bold !== undefined) isBold = !!fontObj.bold;
                                if (fontObj.italic !== undefined) isItalic = !!fontObj.italic;
                            }
                            fontInfoCache[loadedName] = { psName, isBold, isItalic, ascent: style.ascent, descent: style.descent };
                            resolve();
                        });
                    } catch (e) {
                        fontInfoCache[loadedName] = {
                            psName: style.fontFamily || loadedName,
                            isBold: false, isItalic: false,
                            ascent: style.ascent, descent: style.descent
                        };
                        resolve();
                    }
                }));
            }
            await Promise.all(fontPromises);

            // ═══ Canvas context for pixel color sampling ═══
            const canvasCtx = canvas.getContext('2d');

            // ═══ Compute line heights from text items ═══
            const lineHeightMap = computeLineHeights(textContent.items);

            // ═══ Process text items ═══
            const seenTextItems = new Set();
            for (let idx = 0; idx < textContent.items.length; idx++) {
                const item = textContent.items[idx];
                if (!item.str || item.str.trim() === '') continue;

                const tx = item.transform;
                const fontSize = Math.abs(tx[3]);

                // De-duplication guard: track (text, x, y, fontSize)
                const key = `${item.str}|${tx[4].toFixed(2)}|${tx[5].toFixed(2)}|${fontSize.toFixed(2)}`;
                if (seenTextItems.has(key)) continue;
                seenTextItems.add(key);

                const fontHeight = fontSize * currentScale;
                const x = tx[4] * currentScale;
                const y = viewport.height - (tx[5] * currentScale) - fontHeight;
                const w = item.width * currentScale;
                const h = item.height * currentScale;

                // Get font info from cache (resolved from commonObjs)
                const fi = fontInfoCache[item.fontName] || { psName: item.fontName, isBold: false, isItalic: false };
                const fontMeta = resolveFontMeta(fi.psName, fi.isBold, fi.isItalic);

                // ═══ Color: PDF.js native item.color (primary), canvas sampling (fallback) ═══
                let color = '#000000';
                if (item.color && (Array.isArray(item.color) || item.color.buffer)) {
                    let r = 0, g = 0, b = 0;
                    if (item.color.length >= 3) {
                        r = item.color[0]; g = item.color[1]; b = item.color[2];
                    } else if (item.color.length === 1) {
                        r = g = b = item.color[0];
                    }
                    if (r <= 1 && g <= 1 && b <= 1 && (r > 0 || g > 0 || b > 0)) {
                        r *= 255; g *= 255; b *= 255;
                    }
                    color = '#' + Math.round(r).toString(16).padStart(2, '0')
                        + Math.round(g).toString(16).padStart(2, '0')
                        + Math.round(b).toString(16).padStart(2, '0');
                } else {
                    // Fallback: canvas pixel sampling
                    const tmpCtx = canvas.getContext('2d');
                    const sy = Math.min(Math.max(0, Math.round(y + fontHeight * 0.6)), canvas.height - 1);
                    const fx = Math.floor(x + Math.min(fontHeight * 0.4, w * 0.3));
                    if (fx >= 0 && fx < canvas.width && sy >= 0 && sy < canvas.height) {
                        try {
                            const px = tmpCtx.getImageData(fx, sy, 1, 1).data;
                            if (px[3] > 30 && !(px[0] > 250 && px[1] > 250 && px[2] > 250)) {
                                color = '#' + px[0].toString(16).padStart(2, '0')
                                    + px[1].toString(16).padStart(2, '0')
                                    + px[2].toString(16).padStart(2, '0');
                            }
                        } catch (e) { }
                    }
                }

                // Character width & letter spacing estimate
                const charCount = item.str.length;
                const avgCharWidth = charCount > 0 ? (item.width / charCount) : 0;
                const expectedCharWidth = fontSize * 0.5;
                const letterSpacing = charCount > 1 ? Math.max(0, avgCharWidth - expectedCharWidth) : 0;

                // Line height
                const lineHeight = lineHeightMap[idx] || (fontSize * 1.2);
                const lineHeightRatio = fontSize > 0 ? (lineHeight / fontSize).toFixed(2) : '1.20';

                const span = document.createElement('span');
                span.className = 'text-item';
                span.textContent = item.str;
                span.style.left = x + 'px';
                span.style.top = y + 'px';
                span.style.fontSize = fontHeight + 'px';
                span.style.width = w + 'px';
                span.style.height = (h || fontHeight) + 'px';

                span.dataset.type = 'text';
                span.dataset.text = item.str;
                span.dataset.fontExact = fontMeta.exactName;
                span.dataset.fontFamily = fontMeta.family;
                span.dataset.fontSize = fontSize.toFixed(2);
                span.dataset.fontWeight = fontMeta.weight;
                span.dataset.fontWeightCss = fontMeta.weightNum;
                span.dataset.fontStyle = fontMeta.style;
                span.dataset.lineHeight = lineHeight.toFixed(2);
                span.dataset.lineHeightRatio = lineHeightRatio;
                span.dataset.letterSpacing = letterSpacing.toFixed(2);
                span.dataset.charWidth = avgCharWidth.toFixed(2);

                // Store raw positions relative to top-down CSS grid (at scale 1.0)
                span.dataset.left = tx[4].toFixed(2);
                span.dataset.top = (viewport.viewBox[3] - tx[5] - fontSize).toFixed(2);

                span.dataset.width = (item.width || 0).toFixed(2);
                span.dataset.height = (item.height || 0).toFixed(2);
                span.dataset.color = color;
                span.dataset.rotation = getRotation(tx).toFixed(1);
                span.dataset.direction = item.dir || 'ltr';
                span.dataset.page = pageNum;

                span.addEventListener('mouseenter', showInspector);
                span.addEventListener('mouseleave', hideInspector);
                span.addEventListener('mousemove', moveInspector);
                span.addEventListener('click', copyProperties);

                textLayer.appendChild(span);
            }


            // ═══ Process images (requires operator list for CTM tracking) ═══
            const opList = await page.getOperatorList();
            const OPS = pdfjsLib.OPS;
            const ctmStack = [];
            let ctm = viewport.transform.slice();
            const seenImageItems = new Set();
            let currentFillColor = '#000000';
            let lastRect = null;


            // ═══ DIAGNOSTIC: Log all image-related ops in this page ═══
            const opsReverseLookup = {};
            for (const [name, code] of Object.entries(OPS)) opsReverseLookup[code] = name;
            const imgOpsFound = {};
            for (let di = 0; di < opList.fnArray.length; di++) {
                const opName = opsReverseLookup[opList.fnArray[di]] || `unknown(${opList.fnArray[di]})`;
                if (opName.toLowerCase().includes('paint') || opName.toLowerCase().includes('image')) {
                    imgOpsFound[opName] = (imgOpsFound[opName] || 0) + 1;
                }
            }
            console.log(`[PDF Inspector] Page ${pageNum} image-related ops:`, JSON.stringify(imgOpsFound));

            for (let i = 0; i < opList.fnArray.length; i++) {
                const fn = opList.fnArray[i];
                const args = opList.argsArray[i];

                if (fn === OPS.save) {
                    ctmStack.push(ctm.slice());
                } else if (fn === OPS.restore) {
                    ctm = ctmStack.pop() || viewport.transform.slice();
                } else if (fn === OPS.transform) {
                    ctm = multiplyMatrices(ctm, args);
                } else if (fn === OPS.paintFormXObjectBegin) {
                    // Form XObject — only track CTM (save + transform)
                    ctmStack.push(ctm.slice());
                    if (args[0]) ctm = multiplyMatrices(ctm, args[0]);
                } else if (fn === OPS.paintFormXObjectEnd) {
                    ctm = ctmStack.pop() || viewport.transform.slice();
                } else if (fn === OPS.setFillRGBColor) {
                    currentFillColor = '#' + args.map(v => Math.round(v).toString(16).padStart(2, '0')).join('');
                } else if (fn === OPS.setFillGray) {
                    const g = Math.round(args[0] * 255).toString(16).padStart(2, '0');
                    currentFillColor = `#${g}${g}${g}`;
                } else if (fn === OPS.re) {
                    const rx = args[0], ry = args[1], rw = args[2], rh = args[3];
                    const p0 = transformPoint(ctm, rx, ry);
                    const p1 = transformPoint(ctm, rx + rw, ry + rh);
                    lastRect = {
                        x: Math.min(p0[0], p1[0]),
                        y: Math.min(p0[1], p1[1]),
                        w: Math.abs(p0[0] - p1[0]),
                        h: Math.abs(p0[1] - p1[1])
                    };
                } else if ((fn === OPS.fill || fn === OPS.eoFill) && lastRect) {
                    if (lastRect.w > 2 && lastRect.h > 2 && currentFillColor !== '#ffffff') {
                        const div = document.createElement('div');
                        div.className = 'box-item';
                        div.style.left = lastRect.x + 'px';
                        div.style.top = lastRect.y + 'px';
                        div.style.width = lastRect.w + 'px';
                        div.style.height = lastRect.h + 'px';
                        div.style.backgroundColor = currentFillColor;
                        div.dataset.type = 'box';
                        div.dataset.color = currentFillColor;
                        div.dataset.left = (lastRect.x / currentScale).toFixed(2);
                        div.dataset.top = (lastRect.y / currentScale).toFixed(2);
                        div.dataset.width = (lastRect.w / currentScale).toFixed(2);
                        div.dataset.height = (lastRect.h / currentScale).toFixed(2);
                        div.dataset.page = pageNum;
                        div.addEventListener('mouseenter', showInspector);
                        div.addEventListener('mouseleave', hideInspector);
                        div.addEventListener('mousemove', moveInspector);
                        div.addEventListener('click', copyProperties);
                        textLayer.appendChild(div);
                    }
                    lastRect = null;
                } else if (fn === OPS.paintImageXObject || fn === OPS.paintJpegXObject ||
                    fn === OPS.paintInlineImageXObject || fn === OPS.paintInlineImageXObjectGroup ||
                    fn === OPS.paintImageMaskXObject) {

                    // Determine image name and pixel dimensions based on operator type
                    let imgName, pixelWidth = 0, pixelHeight = 0;
                    let bitsPerComponent = 0, colorSpace = 'unknown';
                    let formatLabel = 'Inline/PNG';
                    let inlineData = null; // raw data for inline images

                    if (fn === OPS.paintImageXObject || fn === OPS.paintJpegXObject) {
                        // Named XObject — lookup from page.objs
                        imgName = args[0];
                        pixelWidth = args[1] || 0;
                        pixelHeight = args[2] || 0;
                        formatLabel = fn === OPS.paintJpegXObject ? 'JPEG' : 'XObject/PNG';

                        try {
                            const imgData = page.objs.get(imgName);
                            if (imgData) {
                                pixelWidth = imgData.width || pixelWidth;
                                pixelHeight = imgData.height || pixelHeight;
                                bitsPerComponent = imgData.bitsPerComponent || 8;
                                if (imgData.data) {
                                    const channels = imgData.data.length / (pixelWidth * pixelHeight);
                                    colorSpace = channels >= 4 ? 'RGBA' : channels === 3 ? 'RGB' : channels === 1 ? 'Grayscale' : 'unknown';
                                }
                            }
                        } catch (e) { console.warn(`[PDF Inspector] Could not get obj for ${imgName}:`, e.message); }

                    } else {
                        // Inline image or image mask — data is in args directly
                        inlineData = args[0];
                        if (inlineData) {
                            pixelWidth = inlineData.width || 0;
                            pixelHeight = inlineData.height || 0;
                            bitsPerComponent = inlineData.bitsPerComponent || 8;
                            if (inlineData.data && pixelWidth > 0 && pixelHeight > 0) {
                                const channels = inlineData.data.length / (pixelWidth * pixelHeight);
                                colorSpace = channels >= 4 ? 'RGBA' : channels === 3 ? 'RGB' : channels === 1 ? 'Grayscale' : 'unknown';
                            }
                        }
                        formatLabel = fn === OPS.paintImageMaskXObject ? 'Mask' : 'Inline';
                        // Generate synthetic name for inline images
                        imgName = `__inline_p${pageNum}_${i}`;
                    }

                    // De-duplication guard: track (imgName, tx, ty)
                    const p0_raw = transformPoint(ctm, 0, 0);
                    const imgKey = `${imgName}|${p0_raw[0].toFixed(2)}|${p0_raw[1].toFixed(2)}`;
                    if (seenImageItems.has(imgKey)) continue;
                    seenImageItems.add(imgKey);

                    const p0 = transformPoint(ctm, 0, 0);
                    const p1 = transformPoint(ctm, 1, 0);
                    const p2 = transformPoint(ctm, 0, 1);
                    const p3 = transformPoint(ctm, 1, 1);

                    const minX = Math.min(p0[0], p1[0], p2[0], p3[0]);
                    const minY = Math.min(p0[1], p1[1], p2[1], p3[1]);
                    const maxX = Math.max(p0[0], p1[0], p2[0], p3[0]);
                    const maxY = Math.max(p0[1], p1[1], p2[1], p3[1]);

                    const drawW = maxX - minX;
                    const drawH = maxY - minY;
                    if (drawW < 2 || drawH < 2) continue; // relaxed from 5 to 2

                    const renderedWPt = drawW / currentScale;
                    const renderedHPt = drawH / currentScale;

                    // Pre-extract inline image data to base64 cache
                    if (inlineData && inlineData.data && pixelWidth > 0 && pixelHeight > 0) {
                        try {
                            const tmpCanvas = document.createElement('canvas');
                            tmpCanvas.width = pixelWidth;
                            tmpCanvas.height = pixelHeight;
                            const tmpCtx = tmpCanvas.getContext('2d');
                            const pixelCount = pixelWidth * pixelHeight;
                            const channels = inlineData.data.length / pixelCount;
                            let rgba;
                            if (channels >= 4) {
                                rgba = new Uint8ClampedArray(inlineData.data);
                            } else if (channels >= 3) {
                                rgba = new Uint8ClampedArray(pixelCount * 4);
                                for (let j = 0; j < pixelCount; j++) {
                                    rgba[j * 4] = inlineData.data[j * 3];
                                    rgba[j * 4 + 1] = inlineData.data[j * 3 + 1];
                                    rgba[j * 4 + 2] = inlineData.data[j * 3 + 2];
                                    rgba[j * 4 + 3] = 255;
                                }
                            } else if (channels >= 1) {
                                rgba = new Uint8ClampedArray(pixelCount * 4);
                                for (let j = 0; j < pixelCount; j++) {
                                    rgba[j * 4] = inlineData.data[j];
                                    rgba[j * 4 + 1] = inlineData.data[j];
                                    rgba[j * 4 + 2] = inlineData.data[j];
                                    rgba[j * 4 + 3] = 255;
                                }
                            }
                            if (rgba) {
                                const imgDataObj = new ImageData(rgba, pixelWidth, pixelHeight);
                                tmpCtx.putImageData(imgDataObj, 0, 0);
                                inlineImageCache[imgName] = tmpCanvas.toDataURL('image/png');
                            }
                        } catch (e) {
                            console.warn(`[PDF Inspector] Failed to pre-cache inline image ${imgName}:`, e.message);
                        }
                    }

                    const div = document.createElement('div');
                    div.className = 'img-item';
                    div.style.left = minX + 'px';
                    div.style.top = minY + 'px';
                    div.style.width = drawW + 'px';
                    div.style.height = drawH + 'px';

                    div.dataset.type = 'image';
                    div.dataset.imgName = imgName;
                    div.dataset.pixelWidth = pixelWidth;
                    div.dataset.pixelHeight = pixelHeight;
                    div.dataset.renderedWidthPt = renderedWPt.toFixed(2);
                    div.dataset.renderedHeightPt = renderedHPt.toFixed(2);
                    div.dataset.left = (minX / currentScale).toFixed(2);
                    div.dataset.top = (minY / currentScale).toFixed(2);
                    div.dataset.dpiX = pixelWidth > 0 ? ((pixelWidth / (renderedWPt / 72))).toFixed(0) : 'N/A';
                    div.dataset.dpiY = pixelHeight > 0 ? ((pixelHeight / (renderedHPt / 72))).toFixed(0) : 'N/A';
                    div.dataset.aspectRatio = pixelWidth > 0 && pixelHeight > 0 ? (pixelWidth / pixelHeight).toFixed(3) : 'N/A';
                    div.dataset.colorSpace = colorSpace;
                    div.dataset.bitsPerComponent = bitsPerComponent;
                    div.dataset.format = formatLabel;
                    div.dataset.page = pageNum;

                    div.addEventListener('mouseenter', showInspector);
                    div.addEventListener('mouseleave', hideInspector);
                    div.addEventListener('mousemove', moveInspector);
                    div.addEventListener('click', copyProperties);

                    textLayer.appendChild(div);
                }
            }

            console.log(`[PDF Inspector] Page ${pageNum}: detected ${seenImageItems.size} image elements`);

            pdfContainer.appendChild(wrapper);
        }


        // ═══ Compute line heights from vertical spacing between items ═══
        function computeLineHeights(items) {
            const map = {};
            for (let i = 0; i < items.length; i++) {
                if (!items[i].str || !items[i].transform) continue;
                const yI = items[i].transform[5];
                const fontSizeI = Math.abs(items[i].transform[3]);
                let bestGap = fontSizeI * 1.2;

                for (let j = i + 1; j < Math.min(i + 20, items.length); j++) {
                    if (!items[j].str || !items[j].transform) continue;
                    const yJ = items[j].transform[5];
                    const gap = Math.abs(yI - yJ);
                    if (gap > fontSizeI * 0.3 && gap < fontSizeI * 4) {
                        bestGap = gap;
                        break;
                    }
                }
                map[i] = bestGap;
            }
            return map;
        }

        // ═══ Font metadata resolution ═══
        // psName = PostScript name from PDF font descriptor (e.g. "Arial-BoldMT")
        // isBold / isItalic = explicit flags from PDF font descriptor
        function resolveFontMeta(psName, isBold, isItalic) {
            // Strip subset prefix (e.g. ABCDEF+Arial-BoldMT → Arial-BoldMT)
            const exactName = psName.replace(/^[A-Z]{6}\+/, '');
            const nameLower = exactName.toLowerCase();

            // Weight: use explicit bold flag first, then check PostScript name
            let weight = 'normal';
            let weightNum = '400';
            if (isBold) {
                weight = 'Bold'; weightNum = '700';
            }
            // Refine weight from name (more specific variants)
            if (nameLower.includes('extrabold') || nameLower.includes('ultrabold') || nameLower.includes('black')) {
                weight = 'ExtraBold'; weightNum = '800';
            } else if (nameLower.includes('semibold') || nameLower.includes('demibold') || nameLower.includes('demi')) {
                weight = 'SemiBold'; weightNum = '600';
            } else if (nameLower.includes('bold') || isBold) {
                weight = 'Bold'; weightNum = '700';
            } else if (nameLower.includes('medium')) {
                weight = 'Medium'; weightNum = '500';
            } else if (nameLower.includes('light') || nameLower.includes('lite')) {
                weight = 'Light'; weightNum = '300';
            } else if (nameLower.includes('thin') || nameLower.includes('hairline')) {
                weight = 'Thin'; weightNum = '100';
            }

            // Style: use explicit italic flag first, then check name
            let style = 'normal';
            if (isItalic || nameLower.includes('italic') || nameLower.includes('oblique')) {
                style = 'italic';
            }

            // Extract clean family name (strip weight/style suffixes for CSS)
            let family = exactName
                .replace(/[-,]?(Extra)?Bold|[-,]?Italic|[-,]?Regular|[-,]?Light|[-,]?Medium|[-,]?SemiBold|[-,]?Thin|[-,]?Oblique|[-,]?Roman|[-,]?Book|[-,]?Condensed|[-,]?Black|[-,]?Demi|[-,]?Heavy/gi, '')
                .replace(/[-]+$/, '').replace(/^[-]+/, '').trim();
            // Handle common PostScript name patterns: ArialMT → Arial
            family = family.replace(/MT$/i, '').replace(/PS$/i, '').replace(/PSMT$/i, '');
            if (!family) family = exactName;

            return { exactName, family, weight, weightNum, style };
        }

        function getRotation(matrix) {
            return Math.atan2(matrix[1], matrix[0]) * (180 / Math.PI);
        }

        // ═══ Extract image base64 from PDF.js page objects (primary) or canvas crop (fallback) ═══
        function extractImageBase64(pageNum, imgName, fallbackCanvas, ix, iy, iw, ih) {
            // Check inline image cache first (for paintInlineImageXObject / paintImageMaskXObject)
            if (inlineImageCache[imgName]) {
                return inlineImageCache[imgName];
            }

            // Primary: extract from PDF.js page objects (full resolution, scale-independent)
            try {
                const page = pageRefs[pageNum];
                if (page) {
                    const imgData = page.objs.get(imgName);
                    if (imgData) {
                        const w = imgData.width;
                        const h = imgData.height;
                        if (w && h && imgData.data) {
                            const tmpCanvas = document.createElement('canvas');
                            tmpCanvas.width = w;
                            tmpCanvas.height = h;
                            const tmpCtx = tmpCanvas.getContext('2d');

                            const pixelCount = w * h;
                            const channels = imgData.data.length / pixelCount;
                            let rgba;

                            if (channels >= 4) {
                                // RGBA data — use directly
                                rgba = new Uint8ClampedArray(imgData.data);
                            } else if (channels >= 3) {
                                // RGB → RGBA
                                rgba = new Uint8ClampedArray(pixelCount * 4);
                                for (let i = 0; i < pixelCount; i++) {
                                    rgba[i * 4] = imgData.data[i * 3];
                                    rgba[i * 4 + 1] = imgData.data[i * 3 + 1];
                                    rgba[i * 4 + 2] = imgData.data[i * 3 + 2];
                                    rgba[i * 4 + 3] = 255;
                                }
                            } else if (channels >= 1) {
                                // Grayscale → RGBA
                                rgba = new Uint8ClampedArray(pixelCount * 4);
                                for (let i = 0; i < pixelCount; i++) {
                                    rgba[i * 4] = imgData.data[i];
                                    rgba[i * 4 + 1] = imgData.data[i];
                                    rgba[i * 4 + 2] = imgData.data[i];
                                    rgba[i * 4 + 3] = 255;
                                }
                            }

                            if (rgba) {
                                const imageDataObj = new ImageData(rgba, w, h);
                                tmpCtx.putImageData(imageDataObj, 0, 0);
                                return tmpCanvas.toDataURL('image/png');
                            }
                        }

                        // Handle HTMLImageElement or ImageBitmap (JPEG objects in some PDF.js versions)
                        if (imgData instanceof HTMLImageElement || imgData instanceof ImageBitmap) {
                            const tmpCanvas = document.createElement('canvas');
                            tmpCanvas.width = imgData.width || imgData.naturalWidth;
                            tmpCanvas.height = imgData.height || imgData.naturalHeight;
                            const tmpCtx = tmpCanvas.getContext('2d');
                            tmpCtx.drawImage(imgData, 0, 0);
                            return tmpCanvas.toDataURL('image/png');
                        }
                    }
                }
            } catch (e) {
                console.warn(`[PDF Inspector] page.objs extraction failed for "${imgName}" on page ${pageNum}:`, e.message);
            }

            // Fallback: canvas region cropping (original method)
            if (fallbackCanvas) {
                try {
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = Math.max(1, Math.round(iw));
                    tmpCanvas.height = Math.max(1, Math.round(ih));
                    const tmpCtx = tmpCanvas.getContext('2d');
                    tmpCtx.drawImage(fallbackCanvas, ix, iy, iw, ih, 0, 0, tmpCanvas.width, tmpCanvas.height);
                    return tmpCanvas.toDataURL('image/png');
                } catch (e) {
                    console.warn(`[PDF Inspector] Canvas fallback failed for "${imgName}":`, e.message);
                }
            }

            console.warn(`[PDF Inspector] Could not extract image "${imgName}" on page ${pageNum} by any method`);
            return '';
        }

        // ═══ Inspector ═══
        function showInspector(e) {
            const el = e.target;
            const d = el.dataset;
            let html = '';
            let copyObj = {};

            if (d.type === 'text') {
                inspectorIcon.textContent = 'Aa';
                inspectorIcon.className = 'inspector-icon';
                inspectorTitle.textContent = 'Text Element';
                inspectorTitle.className = 'inspector-title';

                html += `<div class="inspector-text-preview">"${escapeHtml(d.text)}"</div>`;

                // Typography
                html += sectionLabel('Typography');
                html += row('font-family', d.fontFamily);
                html += row('pdf-font', d.fontExact);
                html += row('font-size', d.fontSize + 'px');
                html += row('font-weight', `${d.fontWeight} (${d.fontWeightCss})`);
                html += row('font-style', d.fontStyle);
                html += row('color', `<span class="color-preview" style="background:${d.color}"></span>${d.color}`);

                // Layout
                html += sectionLabel('Layout');
                html += row('line-height', `${d.lineHeight}px (${d.lineHeightRatio}×)`);
                html += row('letter-spacing', d.letterSpacing + 'px');
                html += row('char-width', d.charWidth + 'px');
                html += row('direction', d.direction);

                // Position & Size
                html += sectionLabel('Position & Size');
                html += row('x', d.left + 'px');
                html += row('y', d.top + 'px');
                html += row('width', d.width + 'px');
                html += row('height', d.height + 'px');

                // Transform (if non-trivial)
                const rot = parseFloat(d.rotation);
                if (rot !== 0 || d.scaleX !== '1.0000') {
                    html += sectionLabel('Transform');
                    html += row('rotation', d.rotation + '°');
                    html += row('scaleX / scaleY', `${d.scaleX} / ${d.scaleY}`);
                }

                // CSS Snippet
                const cssSnippet = generateTextCSS(d);
                html += `<div class="css-snippet">${escapeHtml(cssSnippet)}</div>`;

                copyObj = {
                    type: 'text',
                    content: d.text,
                    details: {
                        fontFamily: `'${d.fontExact}'`,
                        pdfFontName: d.fontFamily,
                        fontSize: d.fontSize, fontWeight: d.fontWeightCss,
                        fontStyle: d.fontStyle, color: d.color,
                        lineHeight: d.lineHeight, letterSpacing: d.letterSpacing,
                        x: d.left, y: d.top,
                        width: d.width, height: d.height,
                        direction: d.direction, rotation: d.rotation + '°',
                        page: d.page, css: cssSnippet
                    }
                };

            } else if (d.type === 'image') {
                inspectorIcon.textContent = '🖼';
                inspectorIcon.className = 'inspector-icon img-icon';
                inspectorTitle.textContent = 'Image Element';
                inspectorTitle.className = 'inspector-title img-title';

                html += sectionLabel('Source');
                html += row('name', d.imgName);
                html += row('format', d.format);
                html += row('color-space', d.colorSpace);
                html += row('bits/component', d.bitsPerComponent);

                html += sectionLabel('Dimensions');
                html += row('intrinsic', `${d.pixelWidth} × ${d.pixelHeight} px`);
                html += row('rendered', `${d.renderedWidthPt}px × ${d.renderedHeightPt}px`);
                html += row('aspect-ratio', d.aspectRatio);

                html += sectionLabel('Resolution');
                html += row('dpi-x', d.dpiX);
                html += row('dpi-y', d.dpiY);

                html += sectionLabel('Position');
                html += row('x', d.left + 'px');
                html += row('y', d.top + 'px');
                html += row('page', d.page);

                const imgCss = generateImageCSS(d);
                html += `<div class="css-snippet">${escapeHtml(imgCss)}</div>`;

                // Extract image via PDF.js page objects (primary) or canvas crop (fallback)
                const pageWrapper = el.closest('.page-wrapper');
                const fallbackCanvas = pageWrapper ? pageWrapper.querySelector('canvas') : null;
                const ix = parseFloat(el.style.left);
                const iy = parseFloat(el.style.top);
                const iw = parseFloat(el.style.width);
                const ih = parseFloat(el.style.height);
                const base64 = extractImageBase64(parseInt(d.page), d.imgName, fallbackCanvas, ix, iy, iw, ih);

                copyObj = {
                    type: 'image',
                    content: base64,
                    details: {
                        name: d.imgName,
                        format: d.format, colorSpace: d.colorSpace,
                        intrinsicSize: `${d.pixelWidth}×${d.pixelHeight}px`,
                        renderedSize: `${d.renderedWidthPt}×${d.renderedHeightPt}px`,
                        dpi: `${d.dpiX}×${d.dpiY}`,
                        aspectRatio: d.aspectRatio,
                        x: d.left, y: d.top,
                        page: d.page, css: imgCss
                    }
                };
            } else if (d.type === 'box') {
                inspectorIcon.textContent = '⬜';
                inspectorIcon.className = 'inspector-icon';
                inspectorTitle.textContent = 'Background Block';
                inspectorTitle.className = 'inspector-title';

                html += sectionLabel('Box Properties');
                html += row('color', `<span class="color-preview" style="background:${d.color}"></span>${d.color}`);
                html += row('x', d.left + 'px');
                html += row('y', d.top + 'px');
                html += row('width', d.width + 'px');
                html += row('height', d.height + 'px');
                html += row('page', d.page);

                copyObj = {
                    type: 'box',
                    content: d.color,
                    details: {
                        color: d.color,
                        x: d.left, y: d.top,
                        width: d.width, height: d.height,
                        page: d.page
                    }
                };
            }


            lastCopyData = copyObj;
            inspectorContent.innerHTML = html;
            inspector.classList.add('visible');
        }

        function hideInspector() {
            inspector.classList.remove('visible');
            lastCopyData = null;
        }

        // ═══ CSS Generation ═══
        function generateTextCSS(d) {
            let css = `/* Text: "${d.text.substring(0, 30)}${d.text.length > 30 ? '...' : ''}" */\n`;
            css += `font-family: '${d.fontExact}';\n`;
            css += `font-size: ${d.fontSize}px;\n`;
            css += `font-weight: ${d.fontWeightCss};\n`;
            if (d.fontStyle !== 'normal') css += `font-style: ${d.fontStyle};\n`;
            css += `line-height: ${d.lineHeightRatio};\n`;
            if (parseFloat(d.letterSpacing) > 0.1) {
                css += `letter-spacing: ${d.letterSpacing}px;\n`;
            }
            css += `color: ${d.color};\n`;
            if (d.direction === 'rtl') css += `direction: rtl;\n`;
            const rot = parseFloat(d.rotation);
            if (rot !== 0) css += `transform: rotate(${d.rotation}deg);\n`;
            return css;
        }

        function generateImageCSS(d) {
            let css = `/* Image: ${d.imgName} */\n`;
            css += `width: ${d.renderedWidthPt}px;\n`;
            css += `height: ${d.renderedHeightPt}px;\n`;
            css += `/* Intrinsic: ${d.pixelWidth}×${d.pixelHeight}px */\n`;
            css += `/* DPI: ${d.dpiX}×${d.dpiY} */\n`;
            css += `object-fit: contain;\n`;
            return css;
        }

        // ═══ Click to Copy ═══
        function copyProperties(e) {
            e.preventDefault();
            if (!lastCopyData || !lastCopyData.content) return;

            const content = lastCopyData.content;
            const typeLabels = { 'text': 'text content', 'image': 'image data', 'box': 'color code' };
            const label = typeLabels[lastCopyData.type] || 'content';

            navigator.clipboard.writeText(content).then(() => showToast(`Copied ${label}`)).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = content;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(`Copied ${label}`);
            });
        }

        function showToast(msg) {
            if (msg) toastEl.textContent = msg;
            else toastEl.textContent = 'Copied to clipboard';
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 1800);
        }

        // ═══ Inspector Movement ═══
        function moveInspector(e) {
            const pad = 16;
            const rect = inspector.getBoundingClientRect();
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const pw = rect.width || 360;
            const ph = rect.height || 400;

            let x = e.clientX + pad;
            let y = e.clientY + pad;

            if (x + pw > vw - pad) x = e.clientX - pw - pad;
            if (x < pad) x = pad;
            if (y + ph > vh - pad) y = e.clientY - ph - pad;
            if (y < pad) y = pad;

            inspector.style.left = x + 'px';
            inspector.style.top = y + 'px';
        }

        // ═══ Utilities ═══
        function multiplyMatrices(m1, m2) {
            return [
                m1[0] * m2[0] + m1[2] * m2[1], m1[1] * m2[0] + m1[3] * m2[1],
                m1[0] * m2[2] + m1[2] * m2[3], m1[1] * m2[2] + m1[3] * m2[3],
                m1[0] * m2[4] + m1[2] * m2[5] + m1[4], m1[1] * m2[4] + m1[3] * m2[5] + m1[5]
            ];
        }

        function transformPoint(m, x, y) {
            return [m[0] * x + m[2] * y + m[4], m[1] * x + m[3] * y + m[5]];
        }

        function rgbToHex(r, g, b) {
            const toHex = v => Math.round(Math.min(1, Math.max(0, v)) * 255).toString(16).padStart(2, '0');
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function row(key, val) {
            return `<div class="inspector-row"><span class="inspector-key">${key}</span><span class="inspector-val">${val}</span></div>`;
        }

        function sectionLabel(text) {
            return `<div class="inspector-section-label">${text}</div>`;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ═══ Zoom ═══
        document.getElementById('zoomIn').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.25, 4);
            zoomLevelEl.textContent = Math.round(currentScale / 1.5 * 100) + '%';
            renderAllPages();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.25, 0.5);
            zoomLevelEl.textContent = Math.round(currentScale / 1.5 * 100) + '%';
            renderAllPages();
        });

        // ═══ Crop Tool ═══
        let cropMode = false;
        let cropState = null; // { wrapper, canvas, textLayer, startX, startY, selDiv }
        const cropBtn = document.getElementById('cropBtn');
        let cropCounter = 0;

        cropBtn.addEventListener('click', () => {
            cropMode = !cropMode;
            cropBtn.classList.toggle('active', cropMode);
            document.body.classList.toggle('crop-mode', cropMode);
        });

        document.getElementById('pdfContainer').addEventListener('mousedown', (e) => {
            if (!cropMode) return;
            const wrapper = e.target.closest('.page-wrapper');
            if (!wrapper) return;
            const canvas = wrapper.querySelector('canvas');
            const textLayer = wrapper.querySelector('.text-layer');
            if (!canvas || !textLayer) return;

            const rect = wrapper.getBoundingClientRect();
            const startX = e.clientX - rect.left + wrapper.scrollLeft;
            const startY = e.clientY - rect.top + wrapper.scrollTop;

            const selDiv = document.createElement('div');
            selDiv.className = 'crop-selection';
            selDiv.style.left = startX + 'px';
            selDiv.style.top = startY + 'px';
            selDiv.style.width = '0px';
            selDiv.style.height = '0px';
            wrapper.appendChild(selDiv);

            cropState = { wrapper, canvas, textLayer, startX, startY, selDiv, rect };
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!cropState) return;
            const { wrapper, startX, startY, selDiv, rect } = cropState;
            const curX = e.clientX - rect.left + wrapper.scrollLeft;
            const curY = e.clientY - rect.top + wrapper.scrollTop;

            const x = Math.min(startX, curX);
            const y = Math.min(startY, curY);
            const w = Math.abs(curX - startX);
            const h = Math.abs(curY - startY);

            selDiv.style.left = x + 'px';
            selDiv.style.top = y + 'px';
            selDiv.style.width = w + 'px';
            selDiv.style.height = h + 'px';
        });

        document.addEventListener('mouseup', (e) => {
            if (!cropState) return;
            const { wrapper, canvas, textLayer, startX, startY, selDiv, rect } = cropState;
            const endX = e.clientX - rect.left + wrapper.scrollLeft;
            const endY = e.clientY - rect.top + wrapper.scrollTop;
            cropState = null;

            // Remove selection rectangle
            selDiv.remove();

            const x = Math.min(startX, endX);
            const y = Math.min(startY, endY);
            const w = Math.abs(endX - startX);
            const h = Math.abs(endY - startY);

            if (w < 5 || h < 5) return; // Too small, ignore

            // Find page number from wrapper
            const pageNum = parseInt(wrapper.dataset.page || '1');

            // Crop from canvas
            const cropName = `__crop_p${pageNum}_${++cropCounter}`;
            try {
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width = Math.round(w);
                tmpCanvas.height = Math.round(h);
                const tmpCtx = tmpCanvas.getContext('2d');
                tmpCtx.drawImage(canvas, x, y, w, h, 0, 0, tmpCanvas.width, tmpCanvas.height);
                inlineImageCache[cropName] = tmpCanvas.toDataURL('image/png');
            } catch (err) {
                console.warn('[PDF Inspector] Crop failed:', err.message);
                return;
            }

            const renderedWPt = w / currentScale;
            const renderedHPt = h / currentScale;

            // Create inspectable overlay div
            const div = document.createElement('div');
            div.className = 'img-item';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            div.style.borderColor = '#f59e0b'; // amber border for cropped items

            div.dataset.type = 'image';
            div.dataset.imgName = cropName;
            div.dataset.pixelWidth = Math.round(w);
            div.dataset.pixelHeight = Math.round(h);
            div.dataset.renderedWidthPt = renderedWPt.toFixed(2);
            div.dataset.renderedHeightPt = renderedHPt.toFixed(2);
            div.dataset.left = (x / currentScale).toFixed(2);
            div.dataset.top = (y / currentScale).toFixed(2);
            div.dataset.dpiX = 'N/A';
            div.dataset.dpiY = 'N/A';
            div.dataset.aspectRatio = (w / h).toFixed(3);
            div.dataset.colorSpace = 'Cropped';
            div.dataset.bitsPerComponent = 'N/A';
            div.dataset.format = 'Crop (User Selection)';
            div.dataset.page = pageNum;

            div.addEventListener('mouseenter', showInspector);
            div.addEventListener('mouseleave', hideInspector);
            div.addEventListener('mousemove', moveInspector);
            div.addEventListener('click', (e) => {
                e.preventDefault();
                const b64 = inlineImageCache[cropName];
                if (!b64) { showToast('Crop data not found'); return; }
                navigator.clipboard.writeText(b64).then(() => showToast('Copied cropped image data')).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = b64;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('Copied cropped image data');
                });
            });

            textLayer.appendChild(div);

            // Exit crop mode after successful crop
            cropMode = false;
            cropBtn.classList.remove('active');
            document.body.classList.remove('crop-mode');

            // Show toast
            showToast('Region captured! Hover to inspect, click to copy base64.');
        });

        // ═══ Download as .hbs ═══
        async function downloadHBS() {
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '\u231b Generating...';

            try {
                // Get original filename
                let baseName = 'document';
                try {
                    const resp = await fetch('/filename');
                    const data = await resp.json();
                    if (data.name) baseName = data.name;
                } catch (e) { }

                // 1. Capture PDF fonts from document head
                let embeddedFonts = '';
                const styleSheets = Array.from(document.styleSheets);
                for (const sheet of styleSheets) {
                    try {
                        const rules = Array.from(sheet.cssRules);
                        for (const rule of rules) {
                            if (rule instanceof CSSFontFaceRule) {
                                embeddedFonts += rule.cssText + '\n';
                            }
                        }
                    } catch (e) { /* ignore cross-origin stylesheet errors */ }
                }

                const pages = document.querySelectorAll('.page-wrapper');
                let pagesHtml = '';

                for (let p = 0; p < pages.length; p++) {
                    const wrapper = pages[p];
                    const canvas = wrapper.querySelector('canvas');
                    const textItemEls = Array.from(wrapper.querySelectorAll('.text-item'));
                    const imgItemEls = Array.from(wrapper.querySelectorAll('.img-item'));
                    const boxItemEls = Array.from(wrapper.querySelectorAll('.box-item'));

                    const pageWidthPt = parseFloat(wrapper.style.width) / currentScale;
                    const pageHeightPt = parseFloat(wrapper.style.height) / currentScale;

                    let elementsHtml = '';

                    // 1. Export Section Backgrounds (Boxes)
                    boxItemEls.forEach(el => {
                        const d = el.dataset;
                        const styles = [
                            'position: absolute',
                            `left: ${d.left}px`,
                            `top: ${d.top}px`,
                            `width: ${d.width}px`,
                            `height: ${d.height}px`,
                            `background-color: ${d.color}`
                        ].join('; ');
                        elementsHtml += `    <div style="${styles}"></div>\n`;
                    });

                    // 2. Export Images (via PDF.js page objects for full-resolution, scale-independent extraction)
                    const pageNum = p + 1; // pages are 1-indexed
                    for (const el of imgItemEls) {
                        const d = el.dataset;
                        const ix = parseFloat(el.style.left);
                        const iy = parseFloat(el.style.top);
                        const iw = parseFloat(el.style.width);
                        const ih = parseFloat(el.style.height);

                        const imgSrc = extractImageBase64(parseInt(d.page || pageNum), d.imgName, canvas, ix, iy, iw, ih);

                        if (imgSrc) {
                            elementsHtml += `    <img src="${imgSrc}" style="position: absolute; left: ${d.left}px; top: ${d.top}px; width: ${d.renderedWidthPt}px; height: ${d.renderedHeightPt}px;" />\n`;
                        } else {
                            console.warn(`[PDF Inspector HBS] Skipped image "${d.imgName}" on page ${d.page} — extraction returned empty`);
                        }
                    }

                    // 3. Horizontal Text Grouping (Line Reconstruction)
                    const items = textItemEls.map(el => ({
                        text: el.dataset.text,
                        left: parseFloat(el.dataset.left),
                        top: parseFloat(el.dataset.top),
                        width: parseFloat(el.dataset.width),
                        fontSize: parseFloat(el.dataset.fontSize),
                        fontExact: el.dataset.fontExact,
                        fontWeight: el.dataset.fontWeightCss,
                        fontStyle: el.dataset.fontStyle,
                        color: el.dataset.color,
                        lineHeightRatio: el.dataset.lineHeightRatio,
                        letterSpacing: el.dataset.letterSpacing
                    })).filter(it => it.text && it.text.trim() !== '');

                    // Sort: Top-down, then Left-to-right
                    items.sort((a, b) => (Math.abs(a.top - b.top) > 1) ? (a.top - b.top) : (a.left - b.left));

                    const lines = [];
                    if (items.length > 0) {
                        let currentLine = [items[0]];
                        for (let i = 1; i < items.length; i++) {
                            const prev = currentLine[currentLine.length - 1];
                            const curr = items[i];
                            const sameRow = Math.abs(curr.top - prev.top) < 2;
                            const sameFont = curr.fontExact === prev.fontExact && curr.fontSize === prev.fontSize && curr.color === prev.color;
                            const gap = curr.left - (prev.left + prev.width);
                            const smallGap = gap < (curr.fontSize * 0.4) || gap < 4;

                            if (sameRow && sameFont && smallGap) {
                                currentLine.push(curr);
                            } else {
                                lines.push(currentLine);
                                currentLine = [curr];
                            }
                        }
                        lines.push(currentLine);
                    }

                    lines.forEach(lineGroup => {
                        const first = lineGroup[0];
                        const mergedText = lineGroup.map(it => it.text).join('');
                        const styles = [
                            'position: absolute',
                            `left: ${first.left.toFixed(2)}px`,
                            `top: ${first.top.toFixed(2)}px`,
                            `font-family: '${first.fontExact}'`,
                            `font-size: ${first.fontSize}px`,
                            `font-weight: ${first.fontWeight}`,
                            first.fontStyle !== 'normal' ? `font-style: ${first.fontStyle}` : '',
                            `color: ${first.color}`,
                            `line-height: ${first.lineHeightRatio}`,
                            parseFloat(first.letterSpacing) > 0.1 ? `letter-spacing: ${first.letterSpacing}px` : '',
                            'white-space: pre',
                            'margin: 0',
                            'padding: 0'
                        ].filter(Boolean).join('; ');

                        const escaped = escapeHtml(mergedText);
                        elementsHtml += `    <span style="${styles}">${escaped}</span>\n`;
                    });

                    pagesHtml += `  <div class="page" style="width: ${pageWidthPt.toFixed(2)}px; height: ${pageHeightPt.toFixed(2)}px; background: #fff;">\n${elementsHtml}  </div>\n`;
                }

                const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${baseName}</title>
    <style>
        @page {
            size: 8.5in 11in;
            margin: 0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #222;
        }
        .page {
            position: relative;
            background: #fff;
            overflow: hidden;
            margin: 20px auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        @media print {
            body { background: transparent; }
            .page { margin: 0; box-shadow: none; }
        }
        /* Captured PDF Fonts */
        ${embeddedFonts}
    </style>
</head>
<body>
${pagesHtml}</body>
</html>`;

                // Trigger download as .hbs
                const blob = new Blob([fullHtml], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${baseName}.hbs`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast('Downloaded ' + baseName + '.hbs');
            } catch (err) {
                console.error('Download error:', err);
                showToast('Download failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '\u2b07 Download .hbs';
            }
        }
        window.downloadHBS = downloadHBS;

        loadPDF();
    </script>
</body>

</html>
